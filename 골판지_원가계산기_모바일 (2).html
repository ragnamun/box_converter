<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>골판지 원가 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f2f1ee;
  --surface: #ffffff;
  --surface2: #f7f6f4;
  --border: #e6e3de;
  --border2: #ccc8c0;
  --text: #1c1a18;
  --text2: #6a6560;
  --text3: #aaa69e;
  --accent: #1d4035;
  --accent2: #2d5c4e;
  --accent-light: #e8f2ee;
  --accent-mid: #c0d9d0;
  --flute: #7a3520;
  --flute-light: #fdf0ec;
  --liner: #1a3358;
  --liner-light: #eef2f8;
  --center: #5c3d10;
  --center-light: #faf3e8;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(20px + var(--safe-bottom));
}

/* ── 헤더 ── */
.top-bar {
  background: var(--accent);
  padding: 16px 16px 14px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 50;
}
.top-bar h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.02em; flex: 1; }
.grade-tag {
  font-size: 12px; font-weight: 700; color: var(--accent);
  background: rgba(255,255,255,0.9); border-radius: 20px; padding: 3px 10px;
}

/* ── 페이지 본문 ── */
.page { padding: 14px 14px 0; display: flex; flex-direction: column; gap: 10px; }

/* ── 섹션 구분선 ── */
.section-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 4px 0 2px;
}
.section-divider span {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.card-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 12px;
}

/* ── 골 선택 ── */
.grade-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.grade-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 11px 6px; gap: 3px;
  border: 1.5px solid var(--border2); border-radius: 12px;
  background: var(--surface2); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.grade-btn .g-name { font-size: 15px; font-weight: 700; color: var(--text); }
.grade-btn .g-ply  { font-size: 10px; color: var(--text3); }
.grade-btn.on { background: var(--accent); border-color: var(--accent); }
.grade-btn.on .g-name { color: #fff; }
.grade-btn.on .g-ply  { color: rgba(255,255,255,0.55); }

/* 레이어 시각화 바 */
.layer-visual {
  display: flex; height: 30px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); margin: 12px 0 0;
}
.lv-seg {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; border-right: 1px solid var(--border);
}
.lv-seg:last-child { border-right: none; }
.lv-liner  { background: var(--liner-light); color: var(--liner); }
.lv-flute  { background: var(--flute-light); color: var(--flute); }
.lv-center { background: var(--center-light); color: var(--center); }

/* ── 레이어 입력 ── */
.layer-list { display: flex; flex-direction: column; gap: 8px; }

.layer-item {
  border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.layer-item-header {
  padding: 6px 12px; display: flex; align-items: center; gap: 8px;
}
.layer-item-header.lh-liner  { background: var(--liner-light); }
.layer-item-header.lh-flute  { background: var(--flute-light); }
.layer-item-header.lh-center { background: var(--center-light); }
.lh-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.lh-name { font-size: 12px; font-weight: 700; }
.lh-name.c-liner  { color: var(--liner); }
.lh-name.c-flute  { color: var(--flute); }
.lh-name.c-center { color: var(--center); }

.layer-item-body {
  display: grid; grid-template-columns: 1fr 72px 84px; gap: 7px;
  padding: 10px; background: #fdfcfa;
  border-top: 1px solid var(--border);
}
.input-sub-label {
  font-size: 9px; color: var(--text3); text-align: center; margin-top: 3px; font-weight: 500;
}

/* ── inputs ── */
input[type="text"], input[type="number"] {
  width: 100%; height: 38px; padding: 0 9px 0 12px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
  background: #fff;
  border: 1.5px solid var(--accent-mid);
  border-left: 3px solid var(--accent);
  border-radius: 8px; color: var(--text); outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus {
  border-color: var(--accent2);
  border-left-color: var(--accent2);
  background: #fff;
  box-shadow: 0 0 0 3px var(--accent-light);
}
input::placeholder { color: var(--text3); font-size: 12px; }
/* 값이 입력된 경우 */
input:not(:placeholder-shown) {
  border-color: var(--border2);
  border-left-color: var(--accent);
  background: #fff;
}

.input-unit { display: flex; }
.input-unit input { border-radius: 8px 0 0 8px; border-right: none; flex: 1; min-width: 0; }
.ubadge {
  height: 38px; padding: 0 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 0 8px 8px 0; font-size: 11px; color: var(--text3);
  display: flex; align-items: center; white-space: nowrap; flex-shrink: 0;
}

/* ── 원가 박스 ── */
.pc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.pc-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px;
}
.pc-box.auto  { background: var(--accent-light); border-color: var(--accent-mid); }
.pc-box.final { background: var(--accent); border-color: var(--accent); }

.pc-label { font-size: 10px; font-weight: 600; color: var(--text3); margin-bottom: 4px; line-height: 1.4; }
.pc-box.auto  .pc-label { color: var(--accent2); }
.pc-box.final .pc-label { color: rgba(255,255,255,0.55); }

.pc-val { font-size: 15px; font-weight: 700; color: var(--text); }
.pc-box.auto  .pc-val { color: var(--accent); }
.pc-box.final .pc-val { color: #fff; }

.pc-input { margin-top: 5px; }
.pc-input input  { height: 36px; font-size: 13px; }
.pc-input .ubadge { height: 36px; font-size: 10px; }

/* ── 규격 입력 ── */
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.field label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--text2);
  margin-bottom: 5px;
}
.field label::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}

/* ── 결과 카드 ── */
.result-card {
  background: var(--accent); border-radius: 14px; padding: 16px;
}
.result-card-title {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.45);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
}
.result-price-box {
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 12px;
}
.result-price-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
.result-price-val   { font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -0.02em; line-height: 1; }
.result-price-unit  { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 400; }

.rg3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 7px; }
.rg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.rm {
  background: rgba(255,255,255,0.09); border-radius: 9px; padding: 10px;
}
.rm .rl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.rm .rv { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
.rm .ru { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 400; }

/* 입력 강조 뱃지 */
.req-badge {
  margin-left: auto;
  font-size: 9px; font-weight: 700;
  color: var(--accent); background: var(--accent-light);
  border: 1px solid var(--accent-mid);
  border-radius: 20px; padding: 1px 7px;
}
.req-badge.done {
  color: #2a7a55; background: #e6f7ee;
  border-color: #a8ddc0;
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="top-bar">
  <h1>골판지 원가 계산기</h1>
  <span class="grade-tag" id="headerGradeTag">A골</span>
</div>

<div class="page">

  <!-- ① 지종 구성 -->
  <div class="section-divider"><span>① 지종 구성</span></div>

  <div class="card">
    <div class="card-label">골 선택</div>
    <div class="grade-grid" id="gradeBtns">
      <button class="grade-btn on" data-g="A"><span class="g-name">A골</span><span class="g-ply">3겹</span></button>
      <button class="grade-btn" data-g="B"><span class="g-name">B골</span><span class="g-ply">3겹</span></button>
      <button class="grade-btn" data-g="E"><span class="g-name">E골</span><span class="g-ply">3겹</span></button>
      <button class="grade-btn" data-g="BA"><span class="g-name">BA골</span><span class="g-ply">5겹</span></button>
      <button class="grade-btn" data-g="BB"><span class="g-name">BB골</span><span class="g-ply">5겹</span></button>
      <button class="grade-btn" data-g="EB"><span class="g-name">EB골</span><span class="g-ply">5겹</span></button>
    </div>
    <div class="layer-visual" id="layerVisual"></div>
  </div>

  <div class="card">
    <div class="card-label">레이어별 원지 입력</div>
    <div class="layer-list" id="layerBody"></div>
  </div>

  <!-- ② 원가 구성 -->
  <div class="section-divider"><span>② 원가 구성</span></div>

  <div class="card">
    <div class="card-label">원지가</div>
    <div class="pc-box auto" style="width:100%">
      <div class="pc-label">원지가 (로스 10% 포함)</div>
      <div class="pc-val" id="pRaw">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">가공비</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="pc-row">
        <div class="pc-box">
          <div class="pc-label">원단 가공비</div>
          <div class="pc-input">
            <div class="input-unit">
              <input type="number" id="processCostSheet" placeholder="0" min="0" inputmode="decimal">
              <span class="ubadge">원/㎡</span>
            </div>
          </div>
        </div>
        <div class="pc-box">
          <div class="pc-label">상자 가공비</div>
          <div class="pc-input">
            <div class="input-unit">
              <input type="number" id="processCostBox" placeholder="0" min="0" inputmode="decimal">
              <span class="ubadge">원/매</span>
            </div>
          </div>
        </div>
      </div>
      <div class="pc-box auto">
        <div class="pc-label">총 가공비 (원단 + 상자)</div>
        <div class="pc-val" id="pTotalProcess">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">원단가 / 상자㎡단가</div>
    <div class="pc-row">
      <div class="pc-box final">
        <div class="pc-label">원단가<br>(원지가 + 원단가공비)</div>
        <div class="pc-val" id="pUnit">—</div>
      </div>
      <div class="pc-box final">
        <div class="pc-label">상자㎡단가<br>(원단가 + 상자가공비)</div>
        <div class="pc-val" id="pBoxSqm">—</div>
      </div>
    </div>
  </div>

  <!-- ③ 상자 규격 -->
  <div class="section-divider"><span>③ 상자 규격</span></div>

  <div class="card">
    <div class="card-label">내치수 (mm)</div>
    <div class="grid3" style="margin-bottom:10px;">
      <div class="field"><label>장 (L)</label><input type="number" id="inL" placeholder="400" min="0" inputmode="numeric"></div>
      <div class="field"><label>폭 (W)</label><input type="number" id="inW" placeholder="300" min="0" inputmode="numeric"></div>
      <div class="field"><label>고 (H)</label><input type="number" id="inH" placeholder="200" min="0" inputmode="numeric"></div>
    </div>
    <div class="grid2" style="margin-bottom:10px;">
      <div class="field">
        <label>절수</label>
        <div class="input-unit"><input type="number" id="inCuts" placeholder="2" min="1" step="1" inputmode="numeric"><span class="ubadge">절</span></div>
      </div>
      <div></div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>접착 여유 (미미)</label>
        <div class="input-unit"><input type="number" id="joinA" value="35" min="0" inputmode="numeric"><span class="ubadge">mm</span></div>
      </div>
      <div class="field">
        <label>날개 여유</label>
        <div class="input-unit"><input type="number" id="wingA" value="4" inputmode="numeric"><span class="ubadge">mm</span></div>
      </div>
    </div>
  </div>

  <!-- ④ 계산 결과 -->
  <div class="section-divider"><span>④ 계산 결과</span></div>

  <div class="result-card">
    <div class="result-card-title">계산 결과</div>
    <div class="result-price-box">
      <div class="result-price-label">상자 단가</div>
      <div class="result-price-val" id="dBoxPrice">—<span class="result-price-unit"> 원</span></div>
    </div>
    <div class="rg3">
      <div class="rm"><p class="rl">원단 장</p><p class="rv" id="rL">—<span class="ru"> mm</span></p></div>
      <div class="rm"><p class="rl">원단 폭</p><p class="rv" id="rW">—<span class="ru"> mm</span></p></div>
      <div class="rm"><p class="rl">상자 폭</p><p class="rv" id="rBoxW">—<span class="ru"> mm</span></p></div>
    </div>
    <div class="rg2">
      <div class="rm"><p class="rl">절수</p><p class="rv" id="rCuts">—<span class="ru"> 절</span></p></div>
      <div class="rm"><p class="rl">상자 면적</p><p class="rv" id="dArea">—<span class="ru"> ㎡</span></p></div>
    </div>
  </div>

</div><!-- /page -->

<script>
var GRADES = {
  A:  {layers:[{n:'표면지',t:'liner'},{n:'A골 심지',t:'flute',f:1.60},{n:'이면지',t:'liner'}],thick:5,ply:3},
  B:  {layers:[{n:'표면지',t:'liner'},{n:'B골 심지',t:'flute',f:1.40},{n:'이면지',t:'liner'}],thick:3,ply:3},
  E:  {layers:[{n:'표면지',t:'liner'},{n:'E골 심지',t:'flute',f:1.30},{n:'이면지',t:'liner'}],thick:1.5,ply:3},
  BA: {layers:[{n:'표면지',t:'liner'},{n:'B골 심지',t:'flute',f:1.40},{n:'중심지',t:'liner'},{n:'A골 심지',t:'flute',f:1.60},{n:'이면지',t:'liner'}],thick:8,ply:5},
  BB: {layers:[{n:'표면지',t:'liner'},{n:'B골 심지',t:'flute',f:1.40},{n:'중심지',t:'liner'},{n:'B골 심지',t:'flute',f:1.40},{n:'이면지',t:'liner'}],thick:6,ply:5},
  EB: {layers:[{n:'표면지',t:'liner'},{n:'E골 심지',t:'flute',f:1.30},{n:'중심지',t:'liner'},{n:'B골 심지',t:'flute',f:1.40},{n:'이면지',t:'liner'}],thick:4.5,ply:5}
};

var selGrade = 'A';

/* 골 선택 */
document.getElementById('gradeBtns').addEventListener('click', function(e) {
  var btn = e.target.closest('.grade-btn');
  if (!btn) return;
  document.querySelectorAll('.grade-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  selGrade = btn.dataset.g;
  document.getElementById('headerGradeTag').textContent = selGrade + '골';
  var wingDef = {A:4,B:4,E:4,BA:6,BB:6,EB:6};
  document.getElementById('wingA').value = wingDef[selGrade];
  buildVisual();
  buildLayers();
});

/* 레이어 시각화 */
function buildVisual() {
  var g = GRADES[selGrade];
  var vis = document.getElementById('layerVisual');
  vis.innerHTML = '';
  g.layers.forEach(function(layer) {
    var seg = document.createElement('div');
    seg.className = 'lv-seg';
    if (layer.t === 'flute') {
      seg.classList.add('lv-flute');
      seg.textContent = layer.n.replace(' 심지','');
    } else if (layer.n === '중심지') {
      seg.classList.add('lv-center');
      seg.textContent = '중심지';
    } else {
      seg.classList.add('lv-liner');
      seg.textContent = layer.n;
    }
    vis.appendChild(seg);
  });
}

/* 레이어 입력 */
function buildLayers() {
  var g = GRADES[selGrade];
  var list = document.getElementById('layerBody');
  list.innerHTML = '';
  g.layers.forEach(function(layer, i) {
    var isFlute  = layer.t === 'flute';
    var isCenter = layer.n === '중심지';
    var hdrClass  = isFlute ? 'lh-flute'  : (isCenter ? 'lh-center'  : 'lh-liner');
    var nameClass = isFlute ? 'c-flute'   : (isCenter ? 'c-center'   : 'c-liner');
    var dotBg     = isFlute ? 'var(--flute)' : (isCenter ? 'var(--center)' : 'var(--liner)');
    var ph = isFlute ? 'S120' : (isCenter ? 'S120' : 'KY180');
    var item = document.createElement('div');
    item.className = 'layer-item';
    item.innerHTML =
      '<div class="layer-item-header '+hdrClass+'" id="lhdr-'+i+'">' +
        '<div class="lh-dot" style="background:'+dotBg+'"></div>' +
        '<span class="lh-name '+nameClass+'">'+layer.n+'</span>' +
        '<span class="req-badge" id="lbadge-'+i+'">입력 필요</span>' +
      '</div>' +
      '<div class="layer-item-body">' +
        '<div><input type="text" data-name="'+i+'" placeholder="'+ph+'"><div class="input-sub-label">원지 종류</div></div>' +
        '<div><input type="number" data-grm="'+i+'" placeholder="180" min="0" step="any" inputmode="decimal" style="text-align:center"><div class="input-sub-label">평량 g/m²</div></div>' +
        '<div><input type="number" data-price="'+i+'" placeholder="원/kg" min="0" step="any" inputmode="decimal" style="text-align:center"><div class="input-sub-label">원지가 원/kg</div></div>' +
      '</div>';
    list.appendChild(item);
  });
  list.addEventListener('input', calc);
  calc();
}

/* 이벤트 리스너 */
['inL','inW','inH','inCuts','joinA','wingA','processCostSheet','processCostBox'].forEach(function(id){
  document.getElementById(id).addEventListener('input', calc);
});

function fmt(n){ return Math.round(n).toLocaleString('ko-KR'); }

function roundWidth(raw) {
  var v = raw + 20;
  if (v <= 1350) return 1350;
  if (v <= 1800) return Math.ceil(v/50)*50;
  return Math.ceil(v/100)*100;
}

function setEl(id, html) { var el=document.getElementById(id); if(el) el.innerHTML=html; }
function setTxt(id, txt) { var el=document.getElementById(id); if(el) el.textContent=txt; }

function calc() {
  var g = GRADES[selGrade];
  var rawPerSqm = 0;
  for (var i=0; i<g.layers.length; i++) {
    var layer = g.layers[i];
    var ge = document.querySelector('[data-grm="'+i+'"]');
    var pe = document.querySelector('[data-price="'+i+'"]');
    var grm     = parseFloat(ge ? ge.value : '') || 0;
    var priceKg = parseFloat(pe ? pe.value : '') || 0;
    if (grm>0 && priceKg>0) {
      var factor = layer.t==='flute' ? (layer.f||1.35) : 1;
      rawPerSqm += (grm/1000)*priceKg*factor;
    }
    /* 뱃지 상태 업데이트 */
    var badge = document.getElementById('lbadge-'+i);
    var ne = document.querySelector('[data-name="'+i+'"]');
    var nameFilled = ne && ne.value.trim();
    if (badge) {
      var filled = grm>0 && priceKg>0;
      badge.textContent = filled ? '입력 완료' : '입력 필요';
      badge.className = 'req-badge' + (filled ? ' done' : '');
    }
  }

  var rawWithLoss      = rawPerSqm > 0 ? rawPerSqm * 1.1 : 0;
  var processCostSheet = parseFloat(document.getElementById('processCostSheet').value) || 0;
  var processCostBox   = parseFloat(document.getElementById('processCostBox').value)   || 0;
  var totalProcess     = processCostSheet + processCostBox;
  var unitCostPerSqm   = rawWithLoss + processCostSheet;
  var boxSqmPrice      = unitCostPerSqm + processCostBox;

  setTxt('pRaw',         rawWithLoss>0    ? fmt(Math.round(rawWithLoss))    +' 원/㎡' : '—');
  setTxt('pUnit',         unitCostPerSqm>0 ? fmt(Math.round(unitCostPerSqm)) +' 원/㎡' : '—');
  setTxt('pTotalProcess', totalProcess>0   ? fmt(Math.round(totalProcess))   +' 원'   : '—');
  setTxt('pBoxSqm',       boxSqmPrice>0    ? fmt(Math.round(boxSqmPrice))    +' 원/㎡' : '—');

  var L    = parseFloat(document.getElementById('inL').value)   || 0;
  var W    = parseFloat(document.getElementById('inW').value)   || 0;
  var H    = parseFloat(document.getElementById('inH').value)   || 0;
  var cuts = parseInt(document.getElementById('inCuts').value)  || 0;
  var join = parseFloat(document.getElementById('joinA').value) || 0;
  var wing = parseFloat(document.getElementById('wingA').value) || 0;

  if (!L||!W||!H||!cuts) {
    setEl('rL',       '—<span class="ru"> mm</span>');
    setEl('rW',       '—<span class="ru"> mm</span>');
    setEl('rBoxW',    '—<span class="ru"> mm</span>');
    setEl('rCuts',    '—<span class="ru"> 절</span>');
    setEl('dArea',    '—<span class="ru"> ㎡</span>');
    setEl('dBoxPrice','—<span class="result-price-unit"> 원</span>');
    return;
  }

  var sheetL   = (L+W)*2 + join;
  var boxWidth  = W+H+wing;
  var sheetW   = roundWidth(boxWidth*cuts);
  var boxArea  = (sheetL/1000)*(sheetW/1000)/cuts;
  var boxPrice = boxSqmPrice>0 ? boxArea*boxSqmPrice : null;

  setEl('rL',    fmt(sheetL)   +'<span class="ru"> mm</span>');
  setEl('rW',    fmt(sheetW)   +'<span class="ru"> mm</span>');
  setEl('rBoxW', fmt(boxWidth) +'<span class="ru"> mm</span>');
  setEl('rCuts', cuts          +'<span class="ru"> 절</span>');
  setEl('dArea', boxArea.toFixed(3)+'<span class="ru"> ㎡</span>');
  setEl('dBoxPrice', boxPrice!==null
    ? fmt(boxPrice)+'<span class="result-price-unit"> 원</span>'
    : '—<span class="result-price-unit"> 원</span>');
}

/* 초기화 */
document.getElementById('wingA').value = 4;
buildVisual();
buildLayers();
</script>
</body>
</html>
